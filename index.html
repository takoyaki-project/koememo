<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="コエメモ">
<title>コエメモ | TAKOYAKI PROJECT</title>
<style>
  :root{
    --bg:#16181D;
    --surface:#21242B;
    --line:#31353E;
    --text:#E8EAED;
    --muted:#8B919A;
    --rec:#E5484D;
    --amber:#F5A623;
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:560px;margin:0 auto;padding:16px 16px 48px;}

  /* ---- ヘッダー ---- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 4px 20px;
  }
  header h1{font-size:17px;font-weight:700;letter-spacing:.04em;}
  header h1 span{color:var(--amber);}
  .gear{
    background:none;border:1px solid var(--line);color:var(--muted);
    width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer;
  }

  /* ---- レコーダーパネル ---- */
  .recorder{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 20px 28px;
    text-align:center;
  }
  .lcd{
    font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    font-variant-numeric:tabular-nums;
    font-size:44px;font-weight:500;letter-spacing:.06em;
    color:var(--amber);
    text-shadow:0 0 18px rgba(245,166,35,.35);
    margin-bottom:4px;
  }
  .lcd.idle{color:#4A4F58;text-shadow:none;}
  .status{font-size:12px;color:var(--muted);height:18px;letter-spacing:.08em;}
  .status .dot{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    background:var(--rec);margin-right:6px;vertical-align:1px;
    animation:blink 1.1s infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  canvas#wave{
    width:100%;height:72px;display:block;margin:16px 0 20px;
  }

  .rec-btn{
    width:84px;height:84px;border-radius:50%;
    border:3px solid var(--line);
    background:radial-gradient(circle at 35% 30%, #FF6A6E, var(--rec));
    box-shadow:0 4px 20px rgba(229,72,77,.35);
    cursor:pointer;transition:transform .1s;
    position:relative;
  }
  .rec-btn:active{transform:scale(.94);}
  .rec-btn .core{
    position:absolute;inset:0;margin:auto;
    width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,.9);
    transition:border-radius .25s,width .25s,height .25s;
  }
  .rec-btn.recording .core{width:26px;height:26px;border-radius:6px;}
  .rec-hint{font-size:12px;color:var(--muted);margin-top:12px;}

  /* ---- 処理中/エラー ---- */
  .notice{
    margin-top:16px;padding:14px;border-radius:12px;
    font-size:13px;line-height:1.7;display:none;text-align:left;
  }
  .notice.busy{display:block;background:rgba(245,166,35,.08);color:var(--amber);border:1px solid rgba(245,166,35,.3);}
  .notice.error{display:block;background:rgba(229,72,77,.08);color:#FF8A8E;border:1px solid rgba(229,72,77,.3);}
  .notice button{
    margin-top:8px;background:none;border:1px solid currentColor;color:inherit;
    padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;
  }

  /* ---- 履歴 ---- */
  .history-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:32px 4px 12px;
  }
  .history-head h2{font-size:14px;font-weight:600;color:var(--muted);letter-spacing:.1em;}
  .history-head small{font-size:11px;color:#565B64;}
  .card{
    background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:16px;margin-bottom:12px;
  }
  .card .meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--muted);margin-bottom:8px;
    font-family:ui-monospace,Menlo,monospace;
  }
  .card .text{
    font-size:14px;line-height:1.9;white-space:pre-wrap;word-break:break-word;
    max-height:5.7em;overflow:hidden;position:relative;
  }
  .card.open .text{max-height:none;}
  .card .text.clamped::after{
    content:"";position:absolute;bottom:0;left:0;right:0;height:1.9em;
    background:linear-gradient(transparent,var(--surface));
  }
  .card.open .text.clamped::after{display:none;}
  .card .actions{display:flex;gap:8px;margin-top:12px;}
  .card .actions button{
    flex:1;background:none;border:1px solid var(--line);color:var(--muted);
    padding:9px 0;border-radius:10px;font-size:12px;cursor:pointer;
  }
  .card .actions button.danger{color:#FF8A8E;border-color:rgba(229,72,77,.35);}
  .empty{
    text-align:center;color:#565B64;font-size:13px;padding:32px 0;line-height:1.8;
  }

  /* ---- 設定モーダル ---- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:none;align-items:flex-end;justify-content:center;z-index:10;
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:var(--surface);border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;width:100%;max-width:560px;
    padding:24px 20px calc(32px + env(safe-area-inset-bottom));
  }
  .modal h3{font-size:15px;margin-bottom:6px;}
  .modal p{font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px;}
  .modal input{
    width:100%;background:var(--bg);border:1px solid var(--line);
    color:var(--text);padding:13px 14px;border-radius:10px;font-size:14px;
    font-family:ui-monospace,Menlo,monospace;
  }
  .modal .row{display:flex;gap:10px;margin-top:16px;}
  .modal .row button{
    flex:1;padding:13px 0;border-radius:12px;font-size:14px;cursor:pointer;border:none;
  }
  .btn-save{background:var(--amber);color:#16181D;font-weight:700;}
  .btn-cancel{background:none;border:1px solid var(--line)!important;color:var(--muted);}

  .toast{
    position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);font-size:13px;font-weight:600;
    padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;
    transition:all .25s;z-index:20;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){
    .status .dot{animation:none;}
    .rec-btn,.rec-btn .core,.toast{transition:none;}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>コエメモ <span>●</span></h1>
    <button class="gear" id="gearBtn" aria-label="設定">⚙</button>
  </header>

  <section class="recorder">
    <div class="lcd idle" id="timer">00:00</div>
    <div class="status" id="status">タップして録音を開始</div>
    <canvas id="wave"></canvas>
    <button class="rec-btn" id="recBtn" aria-label="録音">
      <span class="core"></span>
    </button>
    <div class="rec-hint" id="hint">録音中は画面をつけたままにしてください</div>
    <div class="notice" id="notice"></div>
  </section>

  <div class="history-head">
    <h2>これまでの記録</h2>
    <small id="count"></small>
  </div>
  <div id="history"></div>

</div>

<!-- 設定モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>OpenAI APIキー</h3>
    <p>文字起こし(Whisper API)に使います。キーはこの端末のブラウザ内(localStorage)にだけ保存され、外部には送信されません。</p>
    <input type="password" id="keyInput" placeholder="sk-..." autocomplete="off">
    <div class="row">
      <button class="btn-cancel" id="cancelBtn">閉じる</button>
      <button class="btn-save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const KEY_STORAGE = 'koememo_api_key';
  const HISTORY_STORAGE = 'koememo_history';

  const $ = id => document.getElementById(id);
  const timerEl = $('timer'), statusEl = $('status'), recBtn = $('recBtn'),
        noticeEl = $('notice'), historyEl = $('history'), countEl = $('count'),
        modalBg = $('modalBg'), keyInput = $('keyInput'), toastEl = $('toast'),
        canvas = $('wave'), hintEl = $('hint');

  let mediaRecorder = null;
  let chunks = [];
  let stream = null;
  let startTime = 0;
  let timerId = null;
  let audioCtx = null, analyser = null, rafId = null;
  let wakeLock = null;
  let lastBlob = null;   // 失敗時の再送信用
  let lastDuration = 0;
  let mimeType = '', ext = '';

  // ---- 録音フォーマット判定(iOS Safari は audio/mp4)----
  function pickMime(){
    const candidates = [
      ['audio/mp4', 'mp4'],
      ['audio/webm;codecs=opus', 'webm'],
      ['audio/webm', 'webm'],
    ];
    for (const [m, e] of candidates){
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return [m, e];
    }
    return ['', 'webm'];
  }

  // ---- タイマー ----
  function fmt(sec){
    const m = String(Math.floor(sec/60)).padStart(2,'0');
    const s = String(Math.floor(sec%60)).padStart(2,'0');
    return `${m}:${s}`;
  }
  function tick(){
    const sec = (Date.now() - startTime)/1000;
    timerEl.textContent = fmt(sec);
  }

  // ---- 波形 ----
  function setupCanvas(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
  }
  function drawWave(){
    const ctx = canvas.getContext('2d');
    const data = new Uint8Array(analyser.frequencyBinCount);
    const loop = () => {
      rafId = requestAnimationFrame(loop);
      analyser.getByteTimeDomainData(data);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.lineWidth = 2 * (window.devicePixelRatio||1);
      ctx.strokeStyle = '#F5A623';
      ctx.shadowColor = 'rgba(245,166,35,.5)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      const step = canvas.width / data.length;
      for (let i=0;i<data.length;i++){
        const y = (data[i]/255) * canvas.height;
        i===0 ? ctx.moveTo(0,y) : ctx.lineTo(i*step,y);
      }
      ctx.stroke();
    };
    loop();
  }
  function drawIdleLine(){
    setupCanvas();
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth = 2 * (window.devicePixelRatio||1);
    ctx.strokeStyle = '#31353E';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height/2);
    ctx.lineTo(canvas.width, canvas.height/2);
    ctx.stroke();
  }

  // ---- 通知表示 ----
  function notice(type, html){
    noticeEl.className = 'notice ' + type;
    noticeEl.innerHTML = html;
  }
  function clearNotice(){ noticeEl.className = 'notice'; noticeEl.innerHTML = ''; }
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 1800);
  }

  // ---- 録音開始/停止 ----
  async function startRecording(){
    if (!localStorage.getItem(KEY_STORAGE)){
      openModal();
      toast('先にAPIキーを設定してください');
      return;
    }
    try{
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(e){
      notice('error','マイクを使用できませんでした。<br>設定アプリ → Safari → マイク で許可を確認してください。');
      return;
    }
    clearNotice();
    [mimeType, ext] = pickMime();
    chunks = [];
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : undefined);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onStopped;
    mediaRecorder.start(1000); // 1秒ごとにチャンク化(長時間録音の安全策)

    // 波形
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    setupCanvas();
    drawWave();

    // 画面スリープ防止(対応端末のみ)
    try{ wakeLock = await navigator.wakeLock?.request('screen'); }catch(e){}

    startTime = Date.now();
    timerId = setInterval(tick, 250);
    timerEl.classList.remove('idle');
    recBtn.classList.add('recording');
    statusEl.innerHTML = '<span class="dot"></span>録音中';
    hintEl.textContent = 'もう一度タップで停止 → 自動で文字起こしします';
  }

  function stopRecording(){
    lastDuration = Math.floor((Date.now() - startTime)/1000);
    mediaRecorder.stop();
    clearInterval(timerId);
    cancelAnimationFrame(rafId);
    if (audioCtx){ audioCtx.close(); audioCtx = null; }
    if (wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
    stream.getTracks().forEach(t => t.stop());
    recBtn.classList.remove('recording');
    statusEl.textContent = '処理中…';
    hintEl.textContent = '';
    drawIdleLine();
  }

  async function onStopped(){
    const blob = new Blob(chunks, {type: mimeType || 'audio/webm'});
    lastBlob = blob;
    if (blob.size < 2000){
      resetUI();
      notice('error','録音が短すぎるか、音声が取得できませんでした。もう一度お試しください。');
      return;
    }
    if (blob.size > 24*1024*1024){
      resetUI();
      notice('error','録音が長すぎます(Whisper APIの上限は約25MBです)。録音を分けてお試しください。');
      return;
    }
    await transcribe(blob);
  }

  // ---- Whisper API ----
  async function transcribe(blob){
    notice('busy','文字起こし中です… 録音が長いほど時間がかかります(画面はこのままで)。');
    const key = localStorage.getItem(KEY_STORAGE);
    const fd = new FormData();
    fd.append('file', blob, 'recording.' + ext);
    fd.append('model', 'whisper-1');
    fd.append('language', 'ja');
    try{
      const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method:'POST',
        headers:{ 'Authorization':'Bearer ' + key },
        body: fd,
      });
      if (!res.ok){
        const errText = res.status === 401
          ? 'APIキーが正しくないようです。設定(⚙)から確認してください。'
          : `文字起こしに失敗しました(エラー ${res.status})。`;
        notice('error', errText + '<br><button id="retryBtn">同じ録音でもう一度試す</button>');
        $('retryBtn').onclick = () => transcribe(lastBlob);
        resetUI();
        return;
      }
      const data = await res.json();
      saveEntry(data.text || '(音声を認識できませんでした)', lastDuration);
      lastBlob = null;
      clearNotice();
      resetUI();
      toast('文字起こしが完了しました');
    }catch(e){
      notice('error','通信に失敗しました。電波の良い場所で再送信できます。<br><button id="retryBtn">同じ録音でもう一度試す</button>');
      $('retryBtn').onclick = () => transcribe(lastBlob);
      resetUI();
    }
  }

  function resetUI(){
    timerEl.textContent = '00:00';
    timerEl.classList.add('idle');
    statusEl.textContent = 'タップして録音を開始';
    hintEl.textContent = '録音中は画面をつけたままにしてください';
  }

  // ---- 履歴 ----
  function loadHistory(){
    try{ return JSON.parse(localStorage.getItem(HISTORY_STORAGE)) || []; }
    catch(e){ return []; }
  }
  function saveEntry(text, duration){
    const list = loadHistory();
    list.unshift({
      id: Date.now(),
      date: new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
      duration: fmt(duration),
      text,
    });
    localStorage.setItem(HISTORY_STORAGE, JSON.stringify(list));
    renderHistory();
  }
  function deleteEntry(id){
    const list = loadHistory().filter(e => e.id !== id);
    localStorage.setItem(HISTORY_STORAGE, JSON.stringify(list));
    renderHistory();
  }
  function renderHistory(){
    const list = loadHistory();
    countEl.textContent = list.length ? `${list.length}件` : '';
    if (!list.length){
      historyEl.innerHTML = '<div class="empty">まだ記録がありません。<br>録音すると、ここに文字起こしが並びます。</div>';
      return;
    }
    historyEl.innerHTML = '';
    for (const e of list){
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="meta"><span>${e.date}</span><span>REC ${e.duration}</span></div>
        <div class="text"></div>
        <div class="actions">
          <button class="copy">コピー</button>
          <button class="expand">全文を表示</button>
          <button class="danger del">削除</button>
        </div>`;
      const textDiv = card.querySelector('.text');
      textDiv.textContent = e.text;
      // 5行を超えそうならフェードを付ける
      requestAnimationFrame(()=>{
        if (textDiv.scrollHeight > textDiv.clientHeight + 4) textDiv.classList.add('clamped');
        else card.querySelector('.expand').style.display = 'none';
      });
      card.querySelector('.copy').onclick = async () => {
        try{ await navigator.clipboard.writeText(e.text); toast('コピーしました'); }
        catch(err){ toast('コピーできませんでした'); }
      };
      card.querySelector('.expand').onclick = ev => {
        card.classList.toggle('open');
        ev.target.textContent = card.classList.contains('open') ? '折りたたむ' : '全文を表示';
      };
      card.querySelector('.del').onclick = () => {
        if (confirm('この記録を削除しますか?')) deleteEntry(e.id);
      };
      historyEl.appendChild(card);
    }
  }

  // ---- 設定モーダル ----
  function openModal(){
    keyInput.value = localStorage.getItem(KEY_STORAGE) || '';
    modalBg.classList.add('show');
  }
  $('gearBtn').onclick = openModal;
  $('cancelBtn').onclick = () => modalBg.classList.remove('show');
  modalBg.onclick = e => { if (e.target === modalBg) modalBg.classList.remove('show'); };
  $('saveBtn').onclick = () => {
    const v = keyInput.value.trim();
    if (v && !v.startsWith('sk-')){
      toast('「sk-」で始まるキーを入力してください');
      return;
    }
    if (v) localStorage.setItem(KEY_STORAGE, v);
    else localStorage.removeItem(KEY_STORAGE);
    modalBg.classList.remove('show');
    toast(v ? 'APIキーを保存しました' : 'APIキーを削除しました');
  };

  // ---- 録音ボタン ----
  recBtn.onclick = () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
    else startRecording();
  };

  // ---- 初期化 ----
  window.addEventListener('resize', () => {
    if (!analyser) drawIdleLine();
  });
  drawIdleLine();
  renderHistory();
  if (!localStorage.getItem(KEY_STORAGE)){
    setTimeout(openModal, 400);
  }
})();
</script>
</body>
</html>
